prefix: "b3-wgs-"

input:
  fasta:
    backbone: "input/wgs/backbone.b3.fasta"
    samples: "input/wgs/samples.b3.fasta"
  meta:
    backbone: "input/wgs/backbone.tsv"
    samples: "input/wgs/samples.tsv"


output: "results-wgs-b3/"

align:
  reference: "input/wgs/reference.b3.fasta"
  min_len: 14000

scripts:
  tree:
    path: "workflow/scripts/plot_tree_measles_n450.R"
    extra_args: "--width_adjust TRUE --offset_rate 0.2"
  snpdist: 
    path: "workflow/scripts/plot_snpdist.R"
    extra_args: "--font-size 8 --plot-type bottom --labels Designation"
  metrics:
    path: "workflow/scripts/snpdist_metrics.R"
    extra_args: "--group DSid --group outbreak_ref"

filter:
  strains_remove: "input/empty.txt"
  strains_include: "input/empty.txt"
  
mask_utr:
  skip: False
  file: "input/wgs/mask.utr.b3.bed"

# mask positions before snpdist matrix is calculated
mask_snpdist:
  skip: True
  snpdist: "input/mask.snp.bed"

tree:
  model: "GTR+G"
  tree_params: "-B 1000 -bnni -alrt 1000"

refine:
    coalescent: "opt"
    date_inference: "marginal"
    clock_filter_iqd: 4
    
ancestral:
    inference: "joint"

traits:
    columns:
      - country
      - region
    sampling_bias_correction: 3 # currently not used

auspice:
  strain_id_field: "notification_id"
  traits: ["place_of_acquisition_country", "Genotype"]
  config: "resources/auspice.json"
  clades: "resources/clades.tsv"
  colors: "resources/colors.tsv"
  export: "strain division location"